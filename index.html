<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calculadora Cuota 2026 - CDM</title>
    
    <!-- Cargamos Tailwind CSS para el diseño -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Cargamos React para la interactividad -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Cargamos Babel para que el navegador entienda el código -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
      /* En móvil, suben los tamaños de texto para mejor legibilidad */
      @media (max-width: 639px) {
        .text-xs  { font-size: 0.875rem; line-height: 1.25rem; }   /* xs  → sm  */
        .text-sm  { font-size: 1rem;     line-height: 1.5rem;   }   /* sm  → base */
        .text-lg  { font-size: 1.25rem;  line-height: 1.75rem;  }   /* lg  → xl  */
        .text-2xl { font-size: 1.875rem; line-height: 2.25rem;  }   /* 2xl → 3xl */
      }
    </style>
</head>
<body class="bg-slate-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- ICONOS INTEGRADOS ---
        const AlertCircle = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>;
        const Info = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>;
        const Ticket = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2Z"/><path d="M13 5v2"/><path d="M13 17v2"/><path d="M13 11v2"/></svg>;
        const CheckCircle2 = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>;
        const Plus = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>;
        const Trash2 = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>;
        const Users = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>;
        const User = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>;
        const Calendar = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>;
        const Mail = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>;
        const CreditCard = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/></svg>;
        const UserPlus = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" x2="19" y1="8" y2="14"/><line x1="22" x2="16" y1="11" y2="11"/></svg>;
        const Copy = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>;
        const Check = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="20 6 9 17 4 12"/></svg>;


        // --- APLICACIÓN PRINCIPAL ---
        function App() {
          const currentYearForCalculation = 2026;

          const [logoError, setLogoError] = useState(false);
          const [ibanCopied, setIbanCopied] = useState(false);
          const copyIban = () => {
            navigator.clipboard.writeText('ES28 3058 7001 1328 1040 7587');
            setIbanCopied(true);
            setTimeout(() => setIbanCopied(false), 2000);
          };
          const [isFamiliaNumerosa, setIsFamiliaNumerosa] = useState(false);
          const [members, setMembers] = useState([
            {
              id: 1,
              name: "Socio Principal",
              birthYear: "1980",
              isNewMember: false,
              isDiscapacitado: false,
              isFundador: false,
              isConyugeFundador: false,
              parentsAreMembers: true,
            }
          ]);

          const addMember = () => {
            const newId = members.length > 0 ? Math.max(...members.map(m => m.id)) + 1 : 1;
            setMembers([
              ...members,
              {
                id: newId,
                name: `Familiar ${members.length + 1}`,
                birthYear: "2015",
                isNewMember: false,
                isDiscapacitado: false,
                isFundador: false,
                isConyugeFundador: false,
                parentsAreMembers: true,
              }
            ]);
          };

          const removeMember = (id) => {
            setMembers(members.filter(m => m.id !== id));
          };

          const updateMember = (id, field, value) => {
            setMembers(prevMembers => prevMembers.map(m => m.id === id ? { ...m, [field]: value } : m));
          };

          // --- Cálculo del periodo actual (una vez para todos los socios) ---
          const today = new Date();
          const currentMonth = today.getMonth() + 1;
          const currentDay = today.getDate();
          let period = "normal";
          if ((currentMonth === 5 && currentDay >= 8) || (currentMonth === 6 && currentDay <= 19)) {
            period = "retraso";
          } else if ((currentMonth === 6 && currentDay >= 20) || currentMonth > 6) {
            period = "fuera_de_plazo";
          }
          const isPrePeriod = currentMonth < 3 || (currentMonth === 3 && currentDay < 29);

          const calculateMember = (member) => {
            const parsedYear = parseInt(member.birthYear, 10);
            const safeYear = isNaN(parsedYear) ? currentYearForCalculation : parsedYear;
            const age = currentYearForCalculation - safeYear;
            let category = "";
            let baseFee = 0;
            let altaFee = 0;
            let retrasoFee = 0;
            let isBaja = false;

            // En fuera_de_plazo: solo se admiten nuevas altas, sin descuentos de fundador
            const effectiveIsNewMember = period === "fuera_de_plazo" ? true : member.isNewMember;
            const effectiveIsFundador = period === "fuera_de_plazo" ? false : member.isFundador;
            const effectiveIsConyugeFundador = period === "fuera_de_plazo" ? false : member.isConyugeFundador;

            if (age <= 4) {
              category = "Menor de 4 años";
              baseFee = 0;
              altaFee = 0;
            } else if (age <= 6) {
              category = "Infantil";
              baseFee = member.parentsAreMembers ? 0 : 100;
              altaFee = effectiveIsNewMember ? (member.parentsAreMembers ? 0 : 50) : 0;
            } else if (age <= 17) {
              category = "Aspirante";
              baseFee = member.parentsAreMembers ? 88 : 100;
              altaFee = effectiveIsNewMember ? 50 : 0;
            } else {
              // De 18 años en adelante, por defecto todos son Numerarios a 100€
              category = "Numerario";
              baseFee = 100;
              altaFee = effectiveIsNewMember ? 50 : 0;

              // Fundador: prejubilado a 59€ (60-64) y jubilado gratis (65+)
              if (effectiveIsFundador) {
                if (age >= 60 && age <= 64) {
                  category = "Prejubilado";
                  baseFee = 59;
                } else if (age >= 65) {
                  category = "Jubilado";
                  baseFee = 0;
                }
              }
              // Cónyuge de Fundador: sin descuento en prejubilado, jubilado a 68€
              if (effectiveIsConyugeFundador) {
                if (age >= 65) {
                  category = "Jubilado";
                  baseFee = 68;
                }
              }
            }

            // Discapacidad (46€) solo se aplica si su cuota actual es mayor a 46€
            if (age >= 7 && member.isDiscapacitado && baseFee > 46) {
              baseFee = 46;
            }

            // Aplicar recargo si estamos en fecha y no es alta nueva
            if (period === "retraso" && !effectiveIsNewMember) {
              retrasoFee = 10;
            }

            // Aplicar baja si estamos fuera de plazo y no es alta nueva
            if (period === "fuera_de_plazo" && !effectiveIsNewMember) {
              isBaja = true;
              baseFee = 0;
              altaFee = 0;
              retrasoFee = 0;
            }

            const total = baseFee + altaFee + retrasoFee;

            const isChild = (age >= 5 && age <= 25) || member.isDiscapacitado;
            const refundAmount = (isFamiliaNumerosa && isChild && baseFee > 0) ? (baseFee * 0.2) : 0;

            return { age, category, baseFee, altaFee, retrasoFee, isBaja, total, refundAmount };
          };

          const results = members.map(m => ({ ...m, ...calculateMember(m) }));
          const grandTotal = results.reduce((sum, m) => sum + m.total, 0);
          const totalRefund = results.reduce((sum, m) => sum + m.refundAmount, 0);
          
          const hasNewMembers = period === "fuera_de_plazo" || members.some(m => m.isNewMember);
          const hasLittleKids = results.some(m => !m.isBaja && m.age <= 6);
          const hasEligibleChild = results.some(m => !m.isBaja && ((m.age >= 5 && m.age <= 25) || m.isDiscapacitado) && m.baseFee > 0);

          return (
            <div className="min-h-screen bg-slate-100 py-3 px-3 sm:py-8 sm:px-4 font-sans text-slate-800 print:bg-white print:py-0">
              <div className="max-w-xl mx-auto space-y-3 sm:space-y-6">
                
                <div className="bg-gradient-to-br from-blue-700 to-cyan-600 px-5 py-4 text-white rounded-2xl shadow-lg flex items-center gap-4 print:shadow-none print:rounded-xl">
                  {!logoError ? (
                    <img
                      src="logo.png"
                      alt="Escudo San Antonio"
                      className="h-20 w-auto object-contain drop-shadow-md flex-shrink-0 print:h-12"
                      onError={() => setLogoError(true)}
                    />
                  ) : (
                    <Users className="w-14 h-14 opacity-90 flex-shrink-0" />
                  )}
                  <div className="min-w-0">
                    <h1 className="text-2xl font-bold tracking-tight leading-tight uppercase">Calculadora Cuota 2026</h1>
                    <p className="text-blue-100 text-base font-medium mt-0.5 print:text-slate-800">Club Deportivo y Musical San Antonio</p>
                    <div className="flex items-center gap-1 mt-1 text-blue-200 text-sm print:text-slate-600">
                      <Mail className="w-4 h-4 flex-shrink-0" />
                      <a href="mailto:clubdeportivoymusical@gmail.com" className="hover:text-white transition-colors truncate">clubdeportivoymusical@gmail.com</a>
                    </div>
                  </div>
                </div>

                <div className="space-y-3">
                  {results.map((member, index) => (
                    <div key={member.id} className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden transition-all">
                      
                      <div className="bg-slate-50 p-4 border-b border-slate-100 flex justify-between items-center gap-2">
                        <div className="flex items-center space-x-3 flex-1">
                          <div className="bg-blue-100 p-2 rounded-full text-blue-600 flex-shrink-0">
                            <User className="w-5 h-5" />
                          </div>
                          <input 
                            type="text" 
                            value={member.name}
                            onChange={(e) => updateMember(member.id, 'name', e.target.value)}
                            className="font-bold text-slate-700 bg-transparent border-b border-dashed border-slate-300 focus:border-blue-500 outline-none w-full pb-1"
                            placeholder="Nombre"
                          />
                        </div>
                        {members.length > 1 && (
                          <button onClick={() => removeMember(member.id)} className="text-red-400 hover:text-red-600 p-2 transition-colors print:hidden flex-shrink-0">
                            <Trash2 className="w-5 h-5" />
                          </button>
                        )}
                      </div>

                      <div className="p-4">
                        <div className="flex gap-3 items-start">

                          {/* Columna izquierda: año + opciones */}
                          <div className="flex-1 min-w-0 space-y-3">
                            <div>
                              <label className="block text-sm font-semibold text-slate-500 mb-1 uppercase tracking-wider">Año de Nacimiento</label>
                              <input
                                type="text"
                                inputMode="numeric"
                                pattern="[0-9]*"
                                maxLength={4}
                                value={member.birthYear}
                                onChange={(e) => updateMember(member.id, 'birthYear', e.target.value.replace(/[^0-9]/g, ''))}
                                className="w-full text-3xl font-bold p-2 border-2 border-slate-200 rounded-lg focus:border-blue-500 focus:ring-0 outline-none transition-colors"
                              />
                            </div>

                            <div className="space-y-2 bg-slate-50 p-3 rounded-xl">
                              <label className="flex items-center space-x-3 cursor-pointer">
                                <input
                                  type="checkbox"
                                  checked={period === "fuera_de_plazo" ? true : member.isNewMember}
                                  disabled={period === "fuera_de_plazo"}
                                  onChange={(e) => updateMember(member.id, 'isNewMember', e.target.checked)}
                                  className="w-5 h-5 rounded border-slate-300 text-blue-600 disabled:opacity-60"
                                />
                                <span className="text-sm text-slate-700">Paga cuota de alta (Nuevo)</span>
                              </label>

                              <label className="flex items-center space-x-3 cursor-pointer">
                                <input
                                  type="checkbox"
                                  checked={member.isDiscapacitado}
                                  onChange={(e) => updateMember(member.id, 'isDiscapacitado', e.target.checked)}
                                  className="w-5 h-5 rounded border-slate-300 text-blue-600"
                                />
                                <span className="text-sm text-slate-700">Discapacidad acreditada</span>
                              </label>

                              {period !== "fuera_de_plazo" && (
                                <label className="flex items-center space-x-3 cursor-pointer">
                                  <input
                                    type="checkbox"
                                    checked={member.isFundador}
                                    onChange={(e) => {
                                      updateMember(member.id, 'isFundador', e.target.checked);
                                      if(e.target.checked) updateMember(member.id, 'isConyugeFundador', false);
                                    }}
                                    className="w-5 h-5 rounded border-slate-300 text-blue-600"
                                  />
                                  <span className="text-sm text-slate-700">Socio Fundador</span>
                                </label>
                              )}

                              {period !== "fuera_de_plazo" && (
                                <label className="flex items-center space-x-3 cursor-pointer">
                                  <input
                                    type="checkbox"
                                    checked={member.isConyugeFundador}
                                    onChange={(e) => {
                                      updateMember(member.id, 'isConyugeFundador', e.target.checked);
                                      if(e.target.checked) updateMember(member.id, 'isFundador', false);
                                    }}
                                    className="w-5 h-5 rounded border-slate-300 text-blue-600"
                                  />
                                  <span className="text-sm text-slate-700">Cónyuge de Fundador</span>
                                </label>
                              )}

                              {period !== "fuera_de_plazo" && member.isFundador && member.age < 60 && (
                                <p className="text-xs text-amber-600 mt-1 ml-8 flex items-start">
                                  <AlertCircle className="w-3 h-3 mr-1 mt-0.5 flex-shrink-0" />
                                  Esta condición solo aplica descuento a partir de los 60 años.
                                </p>
                              )}
                              {period !== "fuera_de_plazo" && member.isConyugeFundador && member.age < 65 && (
                                <p className="text-xs text-amber-600 mt-1 ml-8 flex items-start">
                                  <AlertCircle className="w-3 h-3 mr-1 mt-0.5 flex-shrink-0" />
                                  Esta condición solo aplica descuento a partir de los 65 años.
                                </p>
                              )}

                              {member.age <= 17 && (
                                <div className="pt-2 border-t border-slate-200">
                                  <label className="flex items-center space-x-3 cursor-pointer">
                                    <input
                                      type="checkbox"
                                      checked={member.parentsAreMembers}
                                      onChange={(e) => updateMember(member.id, 'parentsAreMembers', e.target.checked)}
                                      className="w-5 h-5 rounded border-slate-300 text-blue-600"
                                    />
                                    <span className="text-sm text-slate-700">Sus padres son socios</span>
                                  </label>
                                  {!member.parentsAreMembers && member.age >= 5 && (
                                    <p className="text-xs text-amber-600 mt-1 ml-8 flex items-start">
                                      <AlertCircle className="w-3 h-3 mr-1 mt-0.5 flex-shrink-0" />
                                      Cuota de Numerario sin padres socios.
                                    </p>
                                  )}
                                </div>
                              )}
                            </div>
                          </div>

                          {/* Columna derecha: edad, categoría, total */}
                          <div className="flex-shrink-0 flex flex-col items-end gap-1 pt-7 text-right">
                            <span className="text-4xl font-extrabold text-slate-700 leading-none">{member.age}</span>
                            <span className="text-xs text-slate-500 leading-tight">años en 2026</span>
                            <span className="text-sm text-blue-600 font-bold uppercase tracking-wide mt-1">{member.category}</span>
                            <div className="mt-auto pt-6 flex flex-col items-end gap-0.5">
                              {!member.isBaja && member.altaFee > 0 && <span className="text-xs text-slate-500">Alta: {member.altaFee.toFixed(2)}€</span>}
                              {!member.isBaja && member.retrasoFee > 0 && <span className="text-xs text-amber-600 font-bold">Recargo: {member.retrasoFee.toFixed(2)}€</span>}
                              <span className={`text-2xl font-extrabold ${member.isBaja ? 'text-red-500' : 'text-slate-800'}`}>
                                {member.isBaja ? '0 €' : `${member.total.toFixed(2)} €`}
                              </span>
                            </div>
                          </div>

                        </div>

                        {member.isBaja && (
                          <div className="bg-red-50 border border-red-200 text-red-700 p-3 rounded-xl mt-3 flex items-start gap-3 shadow-sm print:border-red-400">
                            <AlertCircle className="w-5 h-5 flex-shrink-0 mt-0.5" />
                            <div className="text-sm">
                              <p className="font-bold">Fuera de plazo: Baja automática</p>
                              <p className="mt-1">A partir del 20 de junio no se admiten renovaciones. Si quieres volver a inscribirte en el club, debes marcar la casilla de "Paga cuota de alta (Nuevo)".</p>
                            </div>
                          </div>
                        )}

                      </div>
                    </div>
                  ))}
                </div>

                <button 
                  onClick={addMember}
                  className="w-full py-4 border-2 border-dashed border-blue-300 rounded-2xl text-blue-600 font-bold flex items-center justify-center gap-2 hover:bg-blue-50 transition-colors print:hidden"
                >
                  <Plus className="w-5 h-5" />
                  Añadir otro familiar
                </button>

                {hasEligibleChild && <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                  <label className="flex items-start space-x-3 cursor-pointer">
                    <input 
                      type="checkbox" 
                      checked={isFamiliaNumerosa}
                      onChange={(e) => setIsFamiliaNumerosa(e.target.checked)}
                      className="w-6 h-6 rounded border-slate-300 text-blue-600 focus:ring-blue-500 mt-1"
                    />
                    <div>
                      <span className="block text-base font-bold text-slate-800">Somos Familia Numerosa</span>
                      <span className="block text-sm text-slate-600 mt-1">
                        La cuota se cobra normal por banco. El club te bonificará el 20% de la cuota de los hijos (5-25 años) cuando acredites tu condición en la oficina cada año.
                      </span>
                    </div>
                  </label>
                </div>}

                <div id="resumen-captura" className="bg-blue-50 rounded-3xl p-4 sm:p-6 border border-blue-200 shadow-md print:shadow-none print:border-2 print:border-blue-100 print:bg-white">
                  <h2 className="text-xl font-bold text-blue-800 uppercase tracking-wider mb-4">Resumen Familiar 2026</h2>
                  
                  <div className="space-y-3 mb-5">
                    {results.map(m => (
                      <div key={m.id} className="flex justify-between text-sm text-slate-700 border-b border-blue-100 pb-2 last:border-0 last:pb-0">
                        <span className="truncate pr-4">{m.name} ({m.isBaja ? 'Baja' : m.category})</span>
                        <span className={`font-semibold whitespace-nowrap ${m.isBaja ? 'text-red-500' : ''}`}>
                          {m.total.toFixed(2)} €
                        </span>
                      </div>
                    ))}
                  </div>

                  <div className="flex justify-between items-center border-t-2 border-blue-300 pt-4 gap-2">
                    <span className="text-base sm:text-lg font-bold text-blue-900 leading-tight">Total a pagar:</span>
                    <span className="text-2xl sm:text-3xl font-extrabold text-blue-700 whitespace-nowrap">{grandTotal.toFixed(2)} €</span>
                  </div>

                  {isPrePeriod && (
                    <div className="mt-4 bg-blue-100 text-blue-900 p-4 rounded-xl text-sm flex items-start gap-3 shadow-sm border border-blue-200">
                      <Info className="w-6 h-6 flex-shrink-0 mt-0.5 text-blue-600" />
                      <p>
                        <strong>El periodo de pago ordinario comienza el 29 de marzo.</strong> Los recibos domiciliados se pasarán el 7 de mayo.
                      </p>
                    </div>
                  )}

                  {hasNewMembers && (
                    <div className="mt-4 bg-sky-100 text-sky-900 p-4 rounded-xl text-sm flex items-start gap-3 shadow-sm border border-sky-200 print:bg-sky-50 print:border-sky-300">
                      <UserPlus className="w-6 h-6 flex-shrink-0 mt-0.5 text-sky-600" />
                      <div className="space-y-2 flex-1 min-w-0">
                        <p>
                          <strong>¡Recuerda formalizar tu alta!</strong> Además de abonar la cuota, es necesario que curses la inscripción. Puedes hacerlo de dos formas:
                        </p>
                        <ul className="list-disc pl-5 space-y-1 break-words">
                          <li>
                            <strong>Online:</strong> Rellenando el formulario web <a href="https://p.berrly.com/cdmsa/registration/4815?lang=es" target="_blank" className="text-sky-700 font-bold underline hover:text-sky-800">haciendo clic aquí</a>.
                          </li>
                          <li>
                            <strong>En papel:</strong> Cumplimentando <a href="Ficha_alta.pdf" download="Ficha_alta.pdf" target="_blank" className="text-sky-700 font-bold underline hover:text-sky-800">esta Ficha de Alta</a> y enviándola escaneada a <strong>clubdeportivoymusical@gmail.com</strong>, echándola al buzón, o entregándola presencialmente los lunes a las 20:00 h en las oficinas.
                          </li>
                        </ul>
                      </div>
                    </div>
                  )}

                  {hasLittleKids && (
                    <div className="mt-4 bg-amber-100 text-amber-900 p-4 rounded-xl text-sm flex items-start gap-3 shadow-sm border border-amber-200 print:bg-amber-50 print:border-amber-300">
                      <Info className="w-6 h-6 flex-shrink-0 mt-0.5 text-amber-600" />
                      <div className="flex-1 min-w-0">
                        <p>
                          <strong>¡El pase de los peques!</strong> Recuerda que debes cursar también la inscripción de los Infantiles y Menores de 4 años para que puedan tener su carnet de acceso al club, aunque su cuota sea gratuita.
                        </p>
                      </div>
                    </div>
                  )}

                  {totalRefund > 0 && (
                    <div className="mt-4 bg-green-100 text-green-800 p-4 rounded-xl text-sm flex items-start gap-3 shadow-sm print:bg-green-50 print:border print:border-green-300">
                      <CheckCircle2 className="w-5 h-5 flex-shrink-0 mt-0.5 text-green-600" />
                      <div>
                        <p><strong>Bonificación por Familia Numerosa:</strong> Recuerda presentar tu carnet en vigor para que te devuelvan <strong>{totalRefund.toFixed(2)}€</strong> de estas cuotas.</p>
                        <ul className="mt-2 space-y-0.5 text-xs text-green-700">
                          {results.filter(m => m.refundAmount > 0).map(m => (
                            <li key={m.id}>{m.name}: {m.baseFee.toFixed(2)}€ × 20% = <strong>{m.refundAmount.toFixed(2)}€</strong></li>
                          ))}
                        </ul>
                      </div>
                    </div>
                  )}
                </div>

                <div className="space-y-3 pb-4 sm:pb-8">
                  
                  {/* Calendario de Pagos */}
                  {period !== "fuera_de_plazo" && <div className="bg-white rounded-2xl p-4 sm:p-5 shadow-sm border border-slate-200 print:border-gray-200">
                    <div className="flex items-center gap-3 mb-4">
                      <div className="bg-blue-50 p-2 rounded-full text-blue-600 print:bg-white print:border print:border-blue-200">
                        <Calendar className="w-5 h-5" />
                      </div>
                      <h3 className="font-bold text-slate-800 uppercase tracking-wider text-sm">Calendario de Pagos 2026</h3>
                    </div>
                    <ul className="space-y-2 text-sm text-slate-600">
                      <li className={`flex items-start gap-2 rounded-lg p-2 -mx-2 ${(period === "normal" && !isPrePeriod) ? 'bg-green-50 border border-green-200' : ''}`}>
                        <span className="text-green-500 font-bold mt-0.5 flex-shrink-0">•</span>
                        <span className="flex-1">
                          <strong>Período ordinario:</strong> Del 29 de marzo al <strong>7 de mayo</strong> (este día se pasarán los recibos por el banco).
                          {period === "normal" && !isPrePeriod && <span className="ml-2 inline-block bg-green-500 text-white text-xs font-bold px-1.5 py-0.5 rounded">AHORA</span>}
                        </span>
                      </li>
                      <li className={`flex items-start gap-2 rounded-lg p-2 -mx-2 ${period === "retraso" ? 'bg-amber-50 border border-amber-200' : ''}`}>
                        <span className="text-amber-500 font-bold mt-0.5 flex-shrink-0">•</span>
                        <span className="flex-1">
                          <strong>Con retraso:</strong> Del 8 de mayo al 19 de junio. Se aplicará un recargo de 10 € por persona.
                          {period === "retraso" && <span className="ml-2 inline-block bg-amber-500 text-white text-xs font-bold px-1.5 py-0.5 rounded">AHORA</span>}
                        </span>
                      </li>
                      <li className={`flex items-start gap-2 rounded-lg p-2 -mx-2 ${period === "fuera_de_plazo" ? 'bg-red-50 border border-red-200' : ''}`}>
                        <span className="text-red-500 font-bold mt-0.5 flex-shrink-0">•</span>
                        <span className="flex-1">
                          <strong>Fuera de plazo:</strong> A partir del 20 de junio solo se admitirán nuevas altas. El impago posterior a esta fecha conlleva la <strong>baja automática</strong> del club.
                          {period === "fuera_de_plazo" && <span className="ml-2 inline-block bg-red-500 text-white text-xs font-bold px-1.5 py-0.5 rounded">AHORA</span>}
                        </span>
                      </li>
                    </ul>
                  </div>}

                  {/* Forma de Pago */}
                  <div className="bg-white rounded-2xl p-4 sm:p-5 shadow-sm border border-slate-200 print:border-gray-200">
                    <div className="flex items-center gap-3 mb-4">
                      <div className="bg-indigo-50 p-2 rounded-full text-indigo-600 print:bg-white print:border print:border-indigo-200">
                        <CreditCard className="w-5 h-5" />
                      </div>
                      <h3 className="font-bold text-slate-800 uppercase tracking-wider text-sm">Forma de Pago</h3>
                    </div>
                    <ul className="space-y-4 text-sm text-slate-600">
                      {period !== "fuera_de_plazo" && (
                        <li className="flex items-start gap-2">
                          <span className="text-indigo-500 font-bold mt-0.5">•</span>
                          <div className="w-full">
                            <span><strong>Domiciliado:</strong> No tienes que hacer nada, el recibo se cargará automáticamente en tu cuenta el <strong>7 de mayo</strong>. Si necesitas cambiar el número de cuenta, puedes hacerlo hasta el <strong>30 de abril</strong>.</span>
                            <span className="block mt-2 text-indigo-800 bg-indigo-50 p-2.5 rounded-lg border border-indigo-100 text-xs print:border-none print:p-0 print:mt-1 print:bg-transparent print:text-slate-600">
                              <strong>¡Importante!</strong> Si detectas algún error en el cobro, por favor, ponte en contacto con nosotros <strong>antes</strong> de devolver el recibo por el banco para evitar gastos de devolución innecesarios.
                            </span>
                          </div>
                        </li>
                      )}
                      <li className="flex items-start gap-2">
                        <span className="text-indigo-500 font-bold mt-0.5">•</span>
                        <div className="w-full">
                          <span><strong>Por transferencia:</strong></span>
                          <div className="bg-slate-50 border border-slate-100 rounded-lg p-3 mt-2 text-sm print:border-none print:p-0 print:mt-1">
                            <span className="block mb-1"><strong>TITULAR:</strong> Club Deportivo y Musical</span>
                            <span className="flex flex-wrap items-center gap-2 mb-1">
                              <span className="break-all"><strong>IBAN:</strong> ES28 3058 7001 1328 1040 7587</span>
                              <button onClick={copyIban} className={`flex items-center gap-1 px-2 py-0.5 rounded text-xs font-semibold transition-colors print:hidden ${ibanCopied ? 'bg-green-100 text-green-700' : 'bg-slate-200 text-slate-600 hover:bg-slate-300'}`}>
                                {ibanCopied ? <><Check className="w-3 h-3" />Copiado</> : <><Copy className="w-3 h-3" />Copiar</>}
                              </button>
                            </span>
                            <span className="block"><strong>CONCEPTO:</strong> Nombre/s de los socio/s</span>
                          </div>
                          <span className="block mt-2 text-indigo-800 bg-indigo-50 p-2.5 rounded-lg border border-indigo-100 text-xs print:border-none print:p-0 print:mt-1 print:bg-transparent print:text-slate-600">
                            Una vez realizada la transferencia, envía el justificante a <strong>clubdeportivoymusical@gmail.com</strong> indicando el nombre de los socios.
                          </span>
                        </div>
                      </li>
                    </ul>
                  </div>

                  {/* Acceso de invitados */}
                  <div className="bg-white rounded-2xl p-4 flex items-center gap-4 shadow-sm border border-slate-200">
                    <div className="bg-cyan-50 p-3 rounded-full text-cyan-600 print:bg-white print:border print:border-cyan-200">
                      <Ticket className="w-6 h-6" />
                    </div>
                    <div>
                      <p className="text-sm text-slate-500 font-bold uppercase tracking-wider">Acceso de invitados</p>
                      <p className="text-base font-bold text-slate-800">La entrada en taquilla son <span className="text-cyan-600 text-lg">7,00 €</span></p>
                      <p className="text-xs text-slate-600 mt-1 font-medium">Los invitados deberán ir siempre de parte de un socio. <strong>No está permitido el acceso a las personas de San Antonio que no sean socias.</strong></p>
                    </div>
                  </div>

                </div>

              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
